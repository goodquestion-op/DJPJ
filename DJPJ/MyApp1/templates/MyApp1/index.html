<html>
<head>
    <title>
        test
    </title>

</head>

<body>



    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit</button>
    </form>

    <select name="post_categories" class="filter-selectbox">
        <option value="zero">"Zero"</option>
        <option value="one">"One"</option>
        <option value="two">"Two"</option>
    </select>

    <select name=teacher class="filter-selectbox">
        {% for Name in teacher %}
        <option value="{{ teacher.Name }}">{{ teacher.Name }}</option>
        {% endfor %}
    </select>



    <br>
    <a href="{% url 'input' %}">Add a new teacher :P</a>
    <br>

    <strong>Teachers!</strong>
    {% if content %}
    <table>
        <tr>
            <th>Name</th>
            <th>Teaching Area</th>
        </tr>
        {% for teach in content %}
        <tr>
            <td>{{teach.Name}}</td>
            <td>{{teach.Area}}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <strong>No DATA!</strong>
    {% endif %}

</body>
    </html>
