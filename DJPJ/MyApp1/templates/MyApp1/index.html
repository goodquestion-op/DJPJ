<html>
<head>
    <title>
        test
    </title>
        {% load static %}
    <link rel="stylesheet" type="text/css" href="../../static/site.css" />
    
</head>

<body>

    <strong>Teachers!</strong>
    {% if content %}
    <table>
        <tr>
            <th>Name</th>
            <th>Teaching Area</th>
        </tr>
        {% for teach in content %}
        <tr>
            <td>{{teach.Name}}</td>
            <td>{{teach.Area}}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <strong>No DATA!</strong>
    {% endif %}

    <br>
    <a href="{% url 'input' %}">Add a new teacher :P</a>
    <br>

    <br>
    <form method="post" class="form-group">
        {% csrf_token %}
        <div class="form-group col-md-12 mb-3">
            <label for="{{ form.Name.label }}">{{ form.Name.label }}</label>
            <input type="text" class="form-control" id="{{ form.Name.auto_id }}" name="{{ form.Name.name }}">
            {{ form.Name }}
        </div>
        <div class="form-group col-md-12 mb-3">
            <label for="{{ form.Area.label }}">{{ form.Area.label }}</label>
            {{ form.Area }}
        </div>
        <hr class="mb-4">
        <button type="submit" class="btn btn-secondary btn-lg btn-block">Submit New Car</button>
    </form>
    <br>
</body>
</html>
